# Data Source Configuration
# Use PostgreSQL for production (Render), fallback to H2 for local
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:carbontax_db}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.h2.Driver}

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# Ensure schema is created before data.sql runs
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ============ Blockchain Configuration ============

# Ethereum Network Configuration
blockchain.rpc.url=${SEPOLIA_RPC_URL:https://sepolia.infura.io/v3/6733b4a7d7f944c78e3001b4fb2c015d}

# Smart Contract Address (Deployed on Sepolia)
blockchain.contract.address=${CONTRACT_ADDRESS:0xC66DD58460aa8F523d2d67BcD3187A3c629BB29B}

# Private key for blockchain interactions
blockchain.private.key=${BLOCKCHAIN_PRIVATE_KEY:7db8750c51aef7688e45b357de4d2227821a33f44b51b583a54558d3fa7ea4f7}

# Network Configuration
blockchain.chain.id=${CHAIN_ID:11155111}
blockchain.network.name=${NETWORK_NAME:sepolia}

# Gas Configuration
blockchain.gas.price=${GAS_PRICE:20000000000}
blockchain.gas.limit=${GAS_LIMIT:6721975}

# Proof of Stake Configuration
blockchain.pos.enabled=true
blockchain.pos.min.stake=1000
blockchain.pos.validator.reward.rate=5

# Server Port
server.port=${PORT:8081}

# Enable async processing
spring.task.execution.pool.core-size=5
