# H2 In-Memory Database for Testing (No installation needed)
spring.datasource.url=jdbc:h2:mem:carbontax_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Ensure schema is created before data.sql runs
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ============ Blockchain Configuration ============

# Ethereum Development Network Configuration
# Using LOCAL HARDHAT NODE for testing (switch to Sepolia for deployment)
blockchain.rpc.url=http://127.0.0.1:8545/

# Testnet RPC (for when ready to deploy to Sepolia)
blockchain.rpc.url.testnet=https://sepolia.infura.io/v3/YOUR_INFURA_PROJECT_ID

# Smart Contract Address (will be set after deployment)
blockchain.contract.address=0x5FbDB2315678afecb367f032d93F642f64180aa3

# Private key for blockchain interactions (KEEP SECURE - use environment variable in production)
# For college project - use a test wallet with testnet ETH
blockchain.private.key=${BLOCKCHAIN_PRIVATE_KEY:}

# Network Configuration
# 31337 = Local Hardhat, 11155111 = Sepolia testnet (PoS), 5 = Goerli (deprecated)
blockchain.chain.id=31337
blockchain.network.name=localhost

# Gas Configuration for devnet
blockchain.gas.price=20000000000
blockchain.gas.limit=6721975

# Proof of Stake Configuration
blockchain.pos.enabled=true
blockchain.pos.min.stake=1000
blockchain.pos.validator.reward.rate=5

# Enable async processing
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100

# Server Configuration
server.port=8081

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
