# Data Source Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:carbontax_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.show-sql=false

# PostgreSQL specific
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# Force a final cleanup of duplicates
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ============ Blockchain Configuration ============
blockchain.rpc.url=${SEPOLIA_RPC_URL:https://sepolia.infura.io/v3/6733b4a7d7f944c78e3001b4fb2c015d}
blockchain.contract.address=${CONTRACT_ADDRESS:0xC66DD58460aa8F523d2d67BcD3187A3c629BB29B}
blockchain.private.key=${BLOCKCHAIN_PRIVATE_KEY:7db8750c51aef7688e45b357de4d2227821a33f44b51b583a54558d3fa7ea4f7}
blockchain.chain.id=${CHAIN_ID:11155111}
blockchain.network.name=${NETWORK_NAME:sepolia}

# Server Port
server.port=${PORT:8081}
spring.task.execution.pool.core-size=5
